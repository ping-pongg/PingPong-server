# ───────────────────────────────────────────────
# CORS 허용 Origin 화이트리스트 설정
map $http_origin $cors_origin {
    default "";
    "http://localhost:5173"                   $http_origin;
    "https://nexus-team02.vercel.app"         $http_origin;
    "https://pingpongg.site"                  $http_origin;
}

# ───────────────────────────────────────────────
# Docker 내부 DNS
resolver 127.0.0.11 valid=10s ipv6=off;

# ───────────────────────────────────────────────
# 1) HTTP: ACME 챌린지 허용, 나머지는 HTTPS로 리다이렉션
server {
    listen 80;
    server_name pingpongg.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ───────────────────────────────────────────────
# 2) HTTPS 요청 + CORS + 프록시 설정
server {
    listen 443 ssl http2;
    server_name pingpongg.site;

    ssl_certificate      /etc/letsencrypt/live/pingpongg.site/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/pingpongg.site/privkey.pem;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ── MCP Server (Streamable HTTP, 커넥션 유지) ──
    location /mcp {
        set $mcp http://mcp-server:3000;
        proxy_pass $mcp;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    300s;
        proxy_connect_timeout   5s;
        proxy_send_timeout    300s;
    }

    # ── OAuth Well-Known 메타데이터 (MCP 서버가 서빙) ──
    # 정확 매치(=)로 ACME 챌린지 경로와 충돌 방지
    location = /.well-known/oauth-protected-resource {
        set $mcp http://mcp-server:3000;
        proxy_pass $mcp;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /.well-known/oauth-authorization-server {
        set $mcp http://mcp-server:3000;
        proxy_pass $mcp;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── OAuth 로그인 / 토큰 발급 (Spring Boot 처리) ──
    location /oauth/ {
        set $upstream http://server:8080;
        proxy_pass $upstream;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    60s;
        proxy_connect_timeout  5s;
        proxy_send_timeout    60s;
    }

    # ── 그 외 모든 요청 → Spring Boot (기존 CORS 설정 유지) ──
    location / {
        # CORS Preflight (OPTIONS 요청 처리)
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'      "$cors_origin" always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Expose-Headers'    'Authorization, Refresh-Token' always;
            add_header 'Access-Control-Max-Age'           3600;
            add_header 'Content-Length'                   0;
            return 204;
        }

        # 일반 요청에 대한 CORS 설정
        add_header 'Access-Control-Allow-Origin'      "$cors_origin" always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Expose-Headers'    'Authorization, Refresh-Token' always;

        # 런타임 DNS 리졸브를 위해 변수로 감싸서 proxy_pass
        set $upstream http://server:8080;
        proxy_pass $upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout    60s;
        proxy_connect_timeout  5s;
        proxy_send_timeout    60s;
    }
}
